spring:
  application:
    name: access-service
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT:2s}
  datasource:
    url: ${ACCESS_DB_URL:jdbc:postgresql://access-db:5432/access_db}
    username: ${ACCESS_DB_USER:access_user}
    password: ${ACCESS_DB_PASS:access_pass}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: 8096

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://discovery-server:8761/eureka/}

internal:
  auth:
    shared-secret: ${INTERNAL_AUTH_SHARED_SECRET:}

sample:
  access:
    seed:
      enabled: ${SAMPLE_ACCESS_SEED_ENABLED:false}

cache:
  platform-access-lookup-ttl: ${CACHE_PLATFORM_ACCESS_LOOKUP_TTL:20s}
  vendor-access-lookup-ttl: ${CACHE_VENDOR_ACCESS_LOOKUP_TTL:20s}

access:
  expiry:
    check-interval-ms: ${ACCESS_EXPIRY_CHECK_INTERVAL_MS:60000}
  audit:
    outbox:
      poll-interval-ms: ${ACCESS_AUDIT_OUTBOX_POLL_INTERVAL_MS:5000}
      initial-delay-ms: ${ACCESS_AUDIT_OUTBOX_INITIAL_DELAY_MS:10000}
      batch-size: ${ACCESS_AUDIT_OUTBOX_BATCH_SIZE:50}
      retry-base-delay-seconds: ${ACCESS_AUDIT_OUTBOX_RETRY_BASE_DELAY_SECONDS:15}
  idempotency:
    enabled: ${ACCESS_IDEMPOTENCY_ENABLED:true}
    key-header-name: ${ACCESS_IDEMPOTENCY_KEY_HEADER_NAME:Idempotency-Key}
    key-prefix: ${ACCESS_IDEMPOTENCY_KEY_PREFIX:access:idem:v1::}
    pending-ttl: ${ACCESS_IDEMPOTENCY_PENDING_TTL:30s}
    response-ttl: ${ACCESS_IDEMPOTENCY_RESPONSE_TTL:6h}

