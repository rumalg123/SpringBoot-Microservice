name: Scan and Deploy main

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      backend_matrix: ${{ steps.detect.outputs.backend_matrix }}
      backend_changed: ${{ steps.detect.outputs.backend_changed }}
      frontend_changed: ${{ steps.detect.outputs.frontend_changed }}
      deploy_services: ${{ steps.detect.outputs.deploy_services }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Detect changed paths
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="$(git rev-parse HEAD~1 || true)"
          fi

          CHANGED_FILES="$(git diff --name-only "$BEFORE" "$AFTER" || true)"

          echo "Changed files:"
          echo "$CHANGED_FILES"

          SERVICES_JSON='[
            {"name":"Discovery-Server","path":"Services/discovery-server","key":"Discovery-Server","compose":"discovery-server"},
            {"name":"API-Gateway","path":"Services/api-gateway","key":"API-Gateway","compose":"api-gateway"},
            {"name":"Customer-Service","path":"Services/customer-service","key":"Customer-Service","compose":"customer-service"},
            {"name":"Order-Service","path":"Services/order-service","key":"Order-Service","compose":"order-service"},
            {"name":"Cart-Service","path":"Services/cart-service","key":"Cart-Service","compose":"cart-service"},
            {"name":"Wishlist-Service","path":"Services/wishlist-service","key":"Wishlist-Service","compose":"wishlist-service"},
            {"name":"Admin-Service","path":"Services/admin-service","key":"Admin-Service","compose":"admin-service"},
            {"name":"Product-Service","path":"Services/product-service","key":"Product-Service","compose":"product-service"},
            {"name":"Poster-Service","path":"Services/poster-service","key":"Poster-Service","compose":"poster-service"},
            {"name":"Vendor-Service","path":"Services/vendor-service","key":"Vendor-Service","compose":"vendor-service"},
            {"name":"Payment-Service","path":"Services/payment-service","key":"Payment-Service","compose":"payment-service"},
            {"name":"Access-Service","path":"Services/access-service","key":"Access-Service","compose":"access-service"},
            {"name":"Analytics-Service","path":"Services/analytics-service","key":"Analytics-Service","compose":"analytics-service"},
            {"name":"Inventory-Service","path":"Services/inventory-service","key":"Inventory-Service","compose":"inventory-service"},
            {"name":"Personalization-Service","path":"Services/personalization-service","key":"Personalization-Service","compose":"personalization-service"},
            {"name":"Promotion-Service","path":"Services/promotion-service","key":"Promotion-Service","compose":"promotion-service"},
            {"name":"Review-Service","path":"Services/review-service","key":"Review-Service","compose":"review-service"},
            {"name":"Search-Service","path":"Services/search-service","key":"Search-Service","compose":"search-service"}
          ]'

          # Reverse dependency graph for deploy expansion
          DEPENDENTS_JSON='{
            "discovery-server": ["customer-service","order-service","cart-service","wishlist-service","product-service","poster-service","vendor-service","access-service","promotion-service","review-service","inventory-service","admin-service","personalization-service","analytics-service","search-service","payment-service","api-gateway","microservice-frontend"],
            "redis": ["customer-service","order-service","cart-service","wishlist-service","product-service","poster-service","vendor-service","access-service","promotion-service","review-service","inventory-service","personalization-service","analytics-service","search-service","payment-service","api-gateway","microservice-frontend"],
            "elasticsearch": ["search-service"],
            "access-service": ["promotion-service","admin-service","api-gateway","microservice-frontend"],
            "vendor-service": ["promotion-service","order-service","cart-service"],
            "promotion-service": ["order-service","cart-service"],
            "api-gateway": ["microservice-frontend"]
          }'

          FULL_APP_SERVICES=(
            discovery-server
            customer-service
            order-service
            cart-service
            wishlist-service
            product-service
            poster-service
            vendor-service
            access-service
            promotion-service
            review-service
            inventory-service
            admin-service
            personalization-service
            analytics-service
            search-service
            payment-service
            api-gateway
            microservice-frontend
          )

          BACKEND_MATRIX='[]'
          DEPLOY_SERVICES=()
          FRONTEND_CHANGED=false

          add_service() {
            local svc="$1"
            for existing in "${DEPLOY_SERVICES[@]:-}"; do
              if [ "$existing" = "$svc" ]; then
                return 0
              fi
            done
            DEPLOY_SERVICES+=("$svc")
          }

          add_backend_row_if_missing() {
            local row="$1"
            local service_path
            service_path=$(echo "$row" | jq -r '.path')

            if ! echo "$BACKEND_MATRIX" | jq -e --arg path "$service_path" '.[] | select(.path == $path)' >/dev/null; then
              BACKEND_MATRIX=$(echo "$BACKEND_MATRIX" | jq --argjson row "$row" '. + [$row]')
            fi
          }

          add_backend_by_compose() {
            local compose_name="$1"
            local row
            row=$(echo "$SERVICES_JSON" | jq -c --arg compose "$compose_name" '.[] | select(.compose == $compose)')
            if [ -n "$row" ]; then
              add_backend_row_if_missing "$row"
            fi
          }

          expand_dependents() {
            local svc="$1"
            local child

            while IFS= read -r child; do
              [ -z "$child" ] && continue

              local already=false
              for existing in "${DEPLOY_SERVICES[@]:-}"; do
                if [ "$existing" = "$child" ]; then
                  already=true
                  break
                fi
              done

              if [ "$already" = false ]; then
                DEPLOY_SERVICES+=("$child")
                add_backend_by_compose "$child"
                if [ "$child" = "microservice-frontend" ]; then
                  FRONTEND_CHANGED=true
                fi
                expand_dependents "$child"
              fi
            done < <(echo "$DEPENDENTS_JSON" | jq -r --arg svc "$svc" '.[$svc][]?')
          }

          # Direct backend code changes
          while IFS= read -r file; do
            [ -z "$file" ] && continue

            while IFS= read -r row; do
              [ -z "$row" ] && continue

              SERVICE_PATH=$(echo "$row" | jq -r '.path')
              COMPOSE_NAME=$(echo "$row" | jq -r '.compose')

              if [[ "$file" == "$SERVICE_PATH/"* ]]; then
                add_backend_row_if_missing "$row"
                add_service "$COMPOSE_NAME"
              fi
            done < <(echo "$SERVICES_JSON" | jq -c '.[]')
          done <<< "$CHANGED_FILES"

          # Frontend code changes
          if echo "$CHANGED_FILES" | grep -q '^microservce-frontend/'; then
            FRONTEND_CHANGED=true
            add_service "microservice-frontend"
          fi

          # Shared / broad redeploy triggers
          if echo "$CHANGED_FILES" | grep -q '^docker-compose\.yml$'; then
            for svc in "${FULL_APP_SERVICES[@]}"; do
              add_service "$svc"
            done
            FRONTEND_CHANGED=true
          fi

          if echo "$CHANGED_FILES" | grep -q '^env/common\.env$'; then
            for svc in "${FULL_APP_SERVICES[@]}"; do
              add_service "$svc"
            done
            FRONTEND_CHANGED=true
          fi

          # Targeted env triggers
          if echo "$CHANGED_FILES" | grep -q '^env/frontend\.env$'; then
            FRONTEND_CHANGED=true
            add_service "microservice-frontend"
          fi

          if echo "$CHANGED_FILES" | grep -q '^env/eureka\.env$'; then
            add_service "discovery-server"
            add_backend_by_compose "discovery-server"
          fi

          if echo "$CHANGED_FILES" | grep -q '^env/customer-service\.env$'; then
            add_service "customer-service"
            add_backend_by_compose "customer-service"
          fi

          if echo "$CHANGED_FILES" | grep -q '^env/order-service\.env$'; then
            add_service "order-service"
            add_backend_by_compose "order-service"
          fi

          if echo "$CHANGED_FILES" | grep -q '^env/cart-service\.env$'; then
            add_service "cart-service"
            add_backend_by_compose "cart-service"
          fi

          if echo "$CHANGED_FILES" | grep -q '^env/wishlist-service\.env$'; then
            add_service "wishlist-service"
            add_backend_by_compose "wishlist-service"
          fi

          if echo "$CHANGED_FILES" | grep -q '^env/product-service\.env$'; then
            add_service "product-service"
            add_backend_by_compose "product-service"
          fi

          if echo "$CHANGED_FILES" | grep -q '^env/poster-service\.env$'; then
            add_service "poster-service"
            add_backend_by_compose "poster-service"
          fi

          if echo "$CHANGED_FILES" | grep -q '^env/vendor-service\.env$'; then
            add_service "vendor-service"
            add_backend_by_compose "vendor-service"
          fi

          if echo "$CHANGED_FILES" | grep -q '^env/access-service\.env$'; then
            add_service "access-service"
            add_backend_by_compose "access-service"
          fi

          if echo "$CHANGED_FILES" | grep -q '^env/promotion-service\.env$'; then
            add_service "promotion-service"
            add_backend_by_compose "promotion-service"
          fi

          if echo "$CHANGED_FILES" | grep -q '^env/review-service\.env$'; then
            add_service "review-service"
            add_backend_by_compose "review-service"
          fi

          if echo "$CHANGED_FILES" | grep -q '^env/inventory-service\.env$'; then
            add_service "inventory-service"
            add_backend_by_compose "inventory-service"
          fi

          if echo "$CHANGED_FILES" | grep -q '^env/admin-service\.env$'; then
            add_service "admin-service"
            add_backend_by_compose "admin-service"
          fi

          if echo "$CHANGED_FILES" | grep -q '^env/personalization-service\.env$'; then
            add_service "personalization-service"
            add_backend_by_compose "personalization-service"
          fi

          if echo "$CHANGED_FILES" | grep -q '^env/analytics-service\.env$'; then
            add_service "analytics-service"
            add_backend_by_compose "analytics-service"
          fi

          if echo "$CHANGED_FILES" | grep -q '^env/search-service\.env$'; then
            add_service "search-service"
            add_backend_by_compose "search-service"
          fi

          if echo "$CHANGED_FILES" | grep -q '^env/payment-service\.env$'; then
            add_service "payment-service"
            add_backend_by_compose "payment-service"
          fi

          # Expand downstream dependents recursively
          INITIAL_SERVICES=("${DEPLOY_SERVICES[@]:-}")
          for svc in "${INITIAL_SERVICES[@]:-}"; do
            [ -n "$svc" ] && expand_dependents "$svc"
          done

          BACKEND_CHANGED=false
          if [ "$(echo "$BACKEND_MATRIX" | jq 'length')" -gt 0 ]; then
            BACKEND_CHANGED=true
          fi
          
          BACKEND_MATRIX_COMPACT="$(echo "$BACKEND_MATRIX" | jq -c '.')"
          DEPLOY_SERVICES_STR="$(printf '%s\n' "${DEPLOY_SERVICES[@]:-}" | awk 'NF' | sort -u | xargs)"
          
          echo "backend_matrix=$BACKEND_MATRIX_COMPACT" >> "$GITHUB_OUTPUT"
          echo "backend_changed=$BACKEND_CHANGED" >> "$GITHUB_OUTPUT"
          echo "frontend_changed=$FRONTEND_CHANGED" >> "$GITHUB_OUTPUT"
          echo "deploy_services=$DEPLOY_SERVICES_STR" >> "$GITHUB_OUTPUT"
          
          echo "Final backend matrix:"
          echo "$BACKEND_MATRIX" | jq .
          
          echo "Final backend matrix compact:"
          echo "$BACKEND_MATRIX_COMPACT"

          echo "Final deploy services:"
          echo "$DEPLOY_SERVICES_STR"

  scan-backend:
    name: Scan changed backend services
    needs: detect-changes
    if: needs.detect-changes.outputs.backend_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.backend_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Cache Sonar packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and analyze ${{ matrix.service.name }}
        working-directory: ${{ matrix.service.path }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn -B clean test org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsurefire.excludes=**/*ApplicationTests.java,**/*IntegrationTest.java,**/*IntegrationTests.java \
            -Dsonar.projectKey=${{ matrix.service.key }} \
            -Dsonar.projectName=${{ matrix.service.name }} \
            -Dsonar.host.url=${SONAR_HOST_URL} \
            -Dsonar.token=${SONAR_TOKEN} \
            -Dsonar.projectBaseDir=$PWD

      - name: Wait for Sonar Quality Gate
        working-directory: ${{ matrix.service.path }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        shell: bash
        run: |
          set -euo pipefail

          REPORT_FILE="target/sonar/report-task.txt"

          if [ ! -f "$REPORT_FILE" ]; then
            echo "Sonar report-task.txt not found"
            exit 1
          fi

          CE_TASK_URL=$(grep '^ceTaskUrl=' "$REPORT_FILE" | cut -d'=' -f2-)

          if [ -z "$CE_TASK_URL" ]; then
            echo "ceTaskUrl not found in report-task.txt"
            exit 1
          fi

          ANALYSIS_ID=""
          for i in {1..60}; do
            RESPONSE=$(curl -s -u "${SONAR_TOKEN}:" "$CE_TASK_URL")
            STATUS=$(echo "$RESPONSE" | jq -r '.task.status')
            ANALYSIS_ID=$(echo "$RESPONSE" | jq -r '.task.analysisId // empty')

            echo "CE task status: $STATUS"

            if [ "$STATUS" = "SUCCESS" ]; then
              break
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELED" ]; then
              echo "Sonar CE task failed"
              exit 1
            fi

            sleep 5
          done

          if [ -z "$ANALYSIS_ID" ]; then
            echo "No analysisId returned from Sonar"
            exit 1
          fi

          QG_RESPONSE=$(curl -s -u "${SONAR_TOKEN}:" \
            "${SONAR_HOST_URL}/api/qualitygates/project_status?analysisId=${ANALYSIS_ID}")

          QG_STATUS=$(echo "$QG_RESPONSE" | jq -r '.projectStatus.status')

          echo "Quality Gate status: $QG_STATUS"

          if [ "$QG_STATUS" != "OK" ]; then
            echo "Quality Gate failed"
            exit 1
          fi

  scan-frontend:
    name: Scan frontend
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: microservce-frontend/package-lock.json

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Cache Sonar packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Install dependencies
        working-directory: microservce-frontend
        run: npm ci

      - name: Build frontend
        working-directory: microservce-frontend
        run: npm run build

      - name: Sonar scan frontend
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: microservce-frontend
          args: >
            -Dsonar.projectKey=Microservice-Frontend
            -Dsonar.projectName=Microservice-Frontend
            -Dsonar.sources=.
            -Dsonar.exclusions=.next/**,node_modules/**,coverage/**

      - name: Wait for frontend Sonar Quality Gate
        working-directory: microservce-frontend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        shell: bash
        run: |
          set -euo pipefail

          REPORT_FILE=".scannerwork/report-task.txt"

          if [ ! -f "$REPORT_FILE" ]; then
            echo "Sonar report-task.txt not found"
            exit 1
          fi

          CE_TASK_URL=$(grep '^ceTaskUrl=' "$REPORT_FILE" | cut -d'=' -f2-)

          if [ -z "$CE_TASK_URL" ]; then
            echo "ceTaskUrl not found in report-task.txt"
            exit 1
          fi

          ANALYSIS_ID=""
          for i in {1..60}; do
            RESPONSE=$(curl -s -u "${SONAR_TOKEN}:" "$CE_TASK_URL")
            STATUS=$(echo "$RESPONSE" | jq -r '.task.status')
            ANALYSIS_ID=$(echo "$RESPONSE" | jq -r '.task.analysisId // empty')

            echo "CE task status: $STATUS"

            if [ "$STATUS" = "SUCCESS" ]; then
              break
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELED" ]; then
              echo "Sonar CE task failed"
              exit 1
            fi

            sleep 5
          done

          if [ -z "$ANALYSIS_ID" ]; then
            echo "No analysisId returned from Sonar"
            exit 1
          fi

          QG_RESPONSE=$(curl -s -u "${SONAR_TOKEN}:" \
            "${SONAR_HOST_URL}/api/qualitygates/project_status?analysisId=${ANALYSIS_ID}")

          QG_STATUS=$(echo "$QG_RESPONSE" | jq -r '.projectStatus.status')

          echo "Quality Gate status: $QG_STATUS"

          if [ "$QG_STATUS" != "OK" ]; then
            echo "Quality Gate failed"
            exit 1
          fi

  deploy:
    name: Deploy
    needs:
      - detect-changes
      - scan-backend
      - scan-frontend
    if: |
      always() &&
      needs.detect-changes.result == 'success' &&
      (needs.scan-backend.result == 'success' || needs.scan-backend.result == 'skipped') &&
      (needs.scan-frontend.result == 'success' || needs.scan-frontend.result == 'skipped')
    runs-on: [self-hosted, Linux, ARM64, java21, microservice]

    steps:
      - name: Deploy changed services
        run: |
          echo "Changed deploy services: ${{ needs.detect-changes.outputs.deploy_services }}"
          /home/ubuntu/deploy_microservice_backend/deploy.sh ${{ needs.detect-changes.outputs.deploy_services }}