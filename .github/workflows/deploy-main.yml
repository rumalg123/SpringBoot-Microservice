name: Scan and Deploy main

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  scan-backend:
    name: Scan backend services
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: Discovery-Server, path: Services/discovery-server, key: Discovery-Server }
          - { name: API-Gateway, path: Services/api-gateway, key: API-Gateway }
          - { name: Customer-Service, path: Services/customer-service, key: Customer-Service }
          - { name: Order-Service, path: Services/order-service, key: Order-Service }
          - { name: Cart-Service, path: Services/cart-service, key: Cart-Service }
          - { name: Wishlist-Service, path: Services/wishlist-service, key: Wishlist-Service }
          - { name: Admin-Service, path: Services/admin-service, key: Admin-Service }
          - { name: Product-Service, path: Services/product-service, key: Product-Service }
          - { name: Poster-Service, path: Services/poster-service, key: Poster-Service }
          - { name: Vendor-Service, path: Services/vendor-service, key: Vendor-Service }
          - { name: Payment-Service, path: Services/payment-service, key: Payment-Service }
          - { name: Access-Service, path: Services/access-service, key: Access-Service }
          - { name: Analytics-Service, path: Services/analytics-service, key: Analytics-Service }
          - { name: Inventory-Service, path: Services/inventory-service, key: Inventory-Service }
          - { name: Personalization-Service, path: Services/personalization-service, key: Personalization-Service }
          - { name: Promotion-Service, path: Services/promotion-service, key: Promotion-Service }
          - { name: Review-Service, path: Services/review-service, key: Review-Service }
          - { name: Search-Service, path: Services/search-service, key: Search-Service }

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Cache Sonar packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and analyze ${{ matrix.service.name }}
        working-directory: ${{ matrix.service.path }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn -B clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=${{ matrix.service.key }} \
            -Dsonar.projectName=${{ matrix.service.name }} \
            -Dsonar.host.url=${SONAR_HOST_URL} \
            -Dsonar.token=${SONAR_TOKEN} \
            -Dsonar.projectBaseDir=$PWD

  scan-frontend:
    name: Scan frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: microservce-frontend/package-lock.json

      - name: Cache Sonar packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Install dependencies
        working-directory: microservce-frontend
        run: npm ci

      - name: Build frontend
        working-directory: microservce-frontend
        run: npm run build

      - name: Sonar scan frontend
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: microservce-frontend
          args: >
            -Dsonar.projectKey=Microservice-Frontend
            -Dsonar.projectName=Microservice-Frontend
            -Dsonar.sources=.
            -Dsonar.exclusions=.next/**,node_modules/**,coverage/**

  deploy:
    name: Deploy
    needs:
      - scan-backend
      - scan-frontend
    runs-on: [self-hosted, Linux, ARM64, java21, microservice]

    steps:
      - name: Deploy
        run: |
          /home/ubuntu/deploy_microservice_backend/deploy.sh